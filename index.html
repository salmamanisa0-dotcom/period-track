<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLO - Period Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container py-4">

    <div class="text-center mb-4">

        <div class="logo-flo">

            🌸

        </div>

        <h1 class="fw-bold text-pink mt-3">

            FLO

        </h1>

        <p class="text-muted">

            Teman terbaik untuk kesehatanmu

        </p>

</div>

    <div class="text-center mb-4">

        <button
            class="btn btn-dark"
            onclick="toggleDarkMode()">

            🌙 Dark Mode

        </button>

    </div>

    <!-- Kalender -->

    <div class="card shadow-sm border-0 mb-3">

        <div class="card-body">

            <h5>📅 Tanggal Mulai Haid</h5>

            <input
            type="date"
            class="form-control"
            id="tanggalMulai">

        </div>

    </div>

    <!-- Hasil Prediksi -->

    <div class="row g-3">

        <div class="col-md-4">

            <div class="card fitur-card">

                <div class="card-body text-center">

                    <h6>🩸 Haid Berikutnya</h6>

                    <h5 id="prediksiHaid">-</h5>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card fitur-card">

                <div class="card-body text-center">

                    <h6>🌱 Masa Subur</h6>

                    <h5 id="masaSubur">-</h5>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card fitur-card">

                <div class="card-body text-center">

                    <h6>🥚 Ovulasi</h6>

                    <h5 id="ovulasi">-</h5>

                </div>

            </div>

        </div>

    </div>

    <div class="card shadow-sm border-0 mt-3">

        <div class="card-body text-center">

            <h5>⏳ Countdown Haid</h5>

            <h4 id="countdownHaid">
            -
            </h4>

        </div>

    </div>

    <div class="card shadow-sm border-0 mt-3">

        <div class="card-body text-center">

            <h5>📊 Statistik Siklus</h5>

            <h4 id="totalSiklus">
             0
            </h4>

        </div>

    </div>
    
    <div class="card shadow-sm border-0 mt-3">

    <div class="card-body text-center">

        <h5>📋 Ringkasan Siklus</h5>

        <div id="ringkasanSiklus">

            Belum ada data

        </div>

    </div>

</div>

    <div class="d-grid mt-4">

        <button
        class="btn btn-pink"
        onclick="hitungPrediksi()">
            
            Simpan Data

        </button>

    </div>

<!-- Kalender Visual -->

<div class="card shadow-sm border-0 mt-4">

    <div class="card-body">

        <h5>📅 Kalender Menstruasi</h5>

        <div id="calendar"></div>

    </div>

</div>

<!-- Catatan Gejala -->

<div class="card shadow-sm border-0 mt-4">

    <div class="card-body">

        <h5>📝 Catatan Gejala</h5>

        <label class="mt-2">Mood</label>

        <select class="form-control" id="mood">

            <option>😊 Senang</option>
            <option>😐 Biasa</option>
            <option>😢 Sedih</option>

        </select>

        <label class="mt-3">Tingkat Nyeri</label>

        <select class="form-control" id="nyeri">

            <option>Tidak Ada</option>
            <option>Ringan</option>
            <option>Sedang</option>
            <option>Berat</option>

        </select>

        <label class="mt-3">Catatan</label>

        <textarea
        class="form-control"
        rows="3"
        id="catatan"
        placeholder="Tulis kondisi hari ini..."></textarea>

        <div class="d-grid mt-3">

            <button
            class="btn btn-pink"
            onclick="simpanGejala()">

                Simpan Catatan

            </button>

        </div>

    </div>

</div>

<!-- Hasil Catatan -->

<div id="hasilGejala" class="mt-3"></div>

<!-- Riwayat Siklus -->

<div class="card shadow-sm border-0 mt-4">

    <div class="card-body">

        <h5>📅 Riwayat Siklus</h5>

        <button
        class="btn btn-danger btn-sm mb-3"
        onclick="hapusSemuaData()">

            🗑️ Hapus Semua Data

        </button>

        <div id="riwayatSiklus">

            <p class="text-muted">
                Belum ada data.
            </p>
           
        </div>
        
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<footer class="text-center py-3 mt-4">
    <small>
        Period Track © 2026 <br>
        Developed by Nisa
    </small>
</footer>

<script src="js/script.js"></script>

</body>
</html>
